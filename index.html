<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cargando...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════
       CONFIGURA AQUÍ TUS VALORES
    ═══════════════════════════════════════ */
    /* Reemplaza estos valores en el JS de abajo:
       TARGET_URL   → la URL a la que redirigir
       ALLOWED_LAT  → latitud del lugar permitido
       ALLOWED_LNG  → longitud del lugar permitido
       RADIUS_M     → radio en metros (ej: 200)
    */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b12;
      --surface: #0f1420;
      --accent: #00f0a0;
      --accent2: #0055ff;
      --text: #e8eaf0;
      --muted: #4a5068;
      --error: #ff3b5c;
      --warn: #ffb800;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,240,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,85,255,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid rgba(0,240,160,0.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: min(420px, 92vw);
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    /* ── Logo / icon ── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      position: relative;
    }
    .icon-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(var(--surface), var(--surface)) padding-box,
                  linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
      animation: spin 2.4s linear infinite;
    }
    .icon-ring::before {
      content: '';
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border-radius: 50%;
      border: 1px solid rgba(0,240,160,0.08);
    }
    .icon-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,240,160,0.15), rgba(0,85,255,0.15));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Heading ── */
    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text);
    }

    /* ── Status message ── */
    #status {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.4em;
      transition: color 0.3s;
    }
    #status.ok    { color: var(--accent); }
    #status.error { color: var(--error); }
    #status.warn  { color: var(--warn); }

    /* ── Progress bar ── */
    .progress-wrap {
      margin: 28px 0 20px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.4s ease;
      box-shadow: 0 0 12px var(--accent);
    }

    /* ── Steps ── */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      color: var(--muted);
      transition: color 0.3s;
    }
    .step.active { color: var(--text); }
    .step.done   { color: var(--accent); }
    .step.fail   { color: var(--error); }

    .step-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      transition: all 0.3s;
    }
    .step.active .step-dot {
      animation: pulse-dot 1s ease-in-out infinite;
    }
    .step.done .step-dot  { background: var(--accent); border-color: var(--accent); color: #000; }
    .step.fail .step-dot  { background: var(--error);  border-color: var(--error);  color: #fff; }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
      50%       { box-shadow: 0 0 0 5px transparent; opacity: 0.7; }
    }

    /* ── Error block ── */
    #error-block {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: rgba(255,59,92,0.08);
      border: 1px solid rgba(255,59,92,0.2);
      border-radius: 10px;
    }
    #error-block p {
      font-size: 0.82rem;
      color: var(--error);
      line-height: 1.5;
    }
    #error-block .err-icon { font-size: 1.4rem; margin-bottom: 6px; }
  </style>
</head>
<body>
<div class="card">

  <div class="icon-wrap">
    <div class="icon-ring"></div>
    <div class="icon-inner">🔐</div>
  </div>

  <h1>Verificando acceso</h1>
  <p id="status">Iniciando...</p>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="steps">
    <div class="step" id="s1">
      <div class="step-dot">1</div>
      <span>Verificando conexión</span>
    </div>
    <div class="step" id="s2">
      <div class="step-dot">2</div>
      <span>Solicitando ubicación</span>
    </div>
    <div class="step" id="s3">
      <div class="step-dot">3</div>
      <span>Validando zona permitida</span>
    </div>
    <div class="step" id="s4">
      <div class="step-dot">4</div>
      <span>Redirigiendo...</span>
    </div>
  </div>

  <div id="error-block">
    <div class="err-icon">🚫</div>
    <p id="error-msg">No tienes acceso desde esta ubicación.</p>
  </div>

</div>

<script>
  /* ═══════════════════════════════════════════
     ✏️  CONFIGURA AQUÍ TUS VALORES
  ═══════════════════════════════════════════ */
  const TARGET_URL  = "https://soporteapp.gcalidad.com";       // ← URL destino
  const ALLOWED_LAT = 00.000000;           // ← Latitud del lugar permitido
  const ALLOWED_LNG = -00.000000;          // ← Longitud del lugar permitido
  const RADIUS_M    = 200;                 // ← Radio permitido en metros
  /* ═══════════════════════════════════════════ */


  const progress = document.getElementById('progress');
  const status   = document.getElementById('status');

  function setStep(id, state) {
    const el = document.getElementById(id);
    el.className = 'step ' + state;
    el.querySelector('.step-dot').textContent =
      state === 'done' ? '✓' : state === 'fail' ? '✗' : el.querySelector('.step-dot').textContent;
  }

  function setProgress(pct) {
    progress.style.width = pct + '%';
  }

  function showError(msg) {
    status.textContent = msg;
    status.className = 'error';
    document.getElementById('error-block').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }

  // Fórmula Haversine — distancia en metros entre dos coordenadas
  function haversineDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function run() {
    // Paso 1 — Conexión
    setStep('s1', 'active');
    status.textContent = 'Verificando conexión...';
    await delay(800);
    setStep('s1', 'done');
    setProgress(25);

    // Paso 2 — Pedir ubicación
    setStep('s2', 'active');
    status.textContent = 'Esperando permiso de ubicación...';
    status.className = 'warn';

    let position;
    try {
      position = await getLocation();
    } catch (err) {
      setStep('s2', 'fail');
      setStep('s3', 'fail');
      setStep('s4', 'fail');
      setProgress(40);
      if (err.code === 1) {
        showError('Permiso de ubicación denegado. Activa el GPS para continuar.');
      } else {
        showError('No se pudo obtener tu ubicación. Intenta de nuevo.');
      }
      return;
    }

    setStep('s2', 'done');
    setProgress(60);

    // Paso 3 — Validar zona
    setStep('s3', 'active');
    status.textContent = 'Validando zona...';
    status.className = '';
    await delay(600);

    const { latitude, longitude, accuracy } = position.coords;
    const distance = haversineDistance(latitude, longitude, ALLOWED_LAT, ALLOWED_LNG);

    // Debug: muestra en consola los valores reales
    console.log(`📍 Tu ubicación: ${latitude}, ${longitude}`);
    console.log(`🎯 Ubicación permitida: ${ALLOWED_LAT}, ${ALLOWED_LNG}`);
    console.log(`📏 Distancia calculada: ${Math.round(distance)} m`);
    console.log(`✅ Radio permitido: ${RADIUS_M} m`);
    console.log(`📡 Precisión del GPS: ${Math.round(accuracy)} m`);

    // Muestra también en pantalla para pruebas
    status.textContent = `Distancia: ${Math.round(distance)}m | Precisión GPS: ${Math.round(accuracy)}m`;

    await delay(1500); // pausa para que puedas leer el valor

    if (distance > RADIUS_M) {
      setStep('s3', 'fail');
      setStep('s4', 'fail');
      setProgress(75);
      showError(`Acceso denegado. Estás a ${Math.round(distance)} m del área permitida (máx. ${RADIUS_M} m).`);
      return;
    }

    setStep('s3', 'done');
    setProgress(85);

    // Paso 4 — Redirigir
    setStep('s4', 'active');
    status.textContent = 'Acceso verificado. Redirigiendo...';
    status.className = 'ok';
    await delay(800);
    setStep('s4', 'done');
    setProgress(100);
    await delay(400);

    window.location.href = TARGET_URL;
  }

  function getLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject({ code: 0, message: 'Geolocalización no soportada.' });
        return;
      }
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      });
    });
  }

  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  run();
</script>
</body>
</html>
